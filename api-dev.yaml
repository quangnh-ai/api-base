version: '3'
services:

  redis:
    image: redis:alpine3.18
    container_name: redis
    ports:
      - 6379:6379
    env_file:
      - redis.env
    command:
      redis-server --requirepass 123456
  
  rabbitmq:
    image: rabbitmq:3.9.29-management-alpine
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    

  api:
    build: ./api/
    container_name: api
    ports:
      - 8081:8081
    env_file:
      - api.env
    volumes:
      - ./api/app/:/app/
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8081 --reload"

    